spring.application.name=tthieu.haniu

# Database Connection (Supabase PostgreSQL / Local)
spring.datasource.url=${DATABASE_URL_POSTGRE:jdbc:postgresql://localhost:5432/haniu?schema=public&sslmode=disable}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port configured via Render or fallback to 8000
server.port=${PORT:8000}

# Elasticsearch Configuration
spring.elasticsearch.uris=${ELASTICSEARCH_NODE:http://localhost:9200}

# Multipart File Upload Configurations
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JavaMailSender Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${SMTP_FROM:tthieu.dev.02@gmail.com}
